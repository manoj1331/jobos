version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobos
      POSTGRES_PASSWORD: jobos_secret
      POSTGRES_DB: jobos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobos -d jobos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: jobos-migrate
    environment:
      DATABASE_URL: postgresql://jobos:jobos_secret@postgres:5432/jobos?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: jobos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://jobos:jobos_secret@postgres:5432/jobos?schema=public
      NEXTAUTH_URL: http://98.88.127.60:8080
      NEXTAUTH_SECRET: jobos-super-secret-key-change-in-production-32chars
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    name: jobos_postgres_data

networks:
  default:
    name: jobos-network
